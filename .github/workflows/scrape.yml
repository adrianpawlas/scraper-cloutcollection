name: Weekly Clout Collection Scraper

on:
  schedule:
    # Run every Thursday at midnight (UTC)
    - cron: '0 0 * * 4'
  
  workflow_dispatch:
    inputs:
      max_products:
        description: 'Max products to scrape (leave empty for all)'
        required: false
        type: string
      test_mode:
        description: 'Run in test mode (5 products)'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps
      
      - name: Run the scraper
        id: run_scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
        run: |
          echo "Test mode: ${{ github.event.inputs.test_mode }}"
          echo "Max products: ${{ github.event.inputs.max_products }}"
          
          if [[ "${{ github.event.inputs.test_mode }}" == "true" ]]; then
            echo "Running in test mode..."
            python main.py --test 2>&1 | tee scraper.log
          elif [[ -n "${{ github.event.inputs.max_products }}" ]]; then
            echo "Running with max products: ${{ github.event.inputs.max_products }}"
            python main.py --max-products ${{ github.event.inputs.max_products }} 2>&1 | tee scraper.log
          else
            echo "Running full scrape..."
            python main.py 2>&1 | tee scraper.log
          fi
          
          echo "scraped=$(grep 'Products scraped:' scraper.log | awk '{print $3}' || echo 0)" >> $GITHUB_OUTPUT
          echo "embedded=$(grep 'Products embedded:' scraper.log | awk '{print $3}' || echo 0)" >> $GITHUB_OUTPUT
          echo "imported=$(grep 'Products imported:' scraper.log | awk '{print $3}' || echo 0)" >> $GITHUB_OUTPUT
      
      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper.log
          retention-days: 7

  notify:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Show result
        run: |
          if [[ "${{ needs.scrape.result }}" == "success" ]]; then
            echo "✅ Clout Collection Scraper completed successfully!"
          else
            echo "❌ Scraper failed. Check logs for details."
            exit 1
          fi